// ── PKCE HELPERS ──
function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
async function generatePKCE() {
  const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = base64urlEncode(
    await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))
  );
  return { verifier, challenge };
}

window.onload = async () => {
  const redirectBase = window.location.href.split('?')[0].split('#')[0];
  const HARDCODED_ID = ''; // ← paste your Spotify Client ID here
  if (HARDCODED_ID) {
    localStorage.setItem('sp_client_id', HARDCODED_ID);
    document.getElementById('client-id-input').value = HARDCODED_ID;
  }

  // Check for OAuth error
  const params = new URLSearchParams(window.location.search);
  const error  = params.get('error');
  const code   = params.get('code');

  if (error) {
    window.history.replaceState(null, '', window.location.pathname);
    setStatus('Spotify דחה גישה: ' + error, 'error');
    return;
  }

  if (code) {
    // Keep setup section visible so status messages show during token exchange
    document.getElementById('section-setup').style.display = '';
    document.getElementById('section-app').style.display = 'none';
    setStatus('<span class="spinner"></span> מתחברים ל־Spotify...', '');
    window.history.replaceState(null, '', window.location.pathname);
    await exchangeCode(code);
    return;
  }

  // Restore existing token - accept even if expiry missing (legacy saves)
  const stored = localStorage.getItem('sp_token');
  const expiry  = localStorage.getItem('sp_token_expiry');
  const expired = expiry ? Date.now() > parseInt(expiry) : false;

  if (stored && !expired) {
    accessToken = stored;
    initApp();
  } else {
    // Always ensure setup is visible as fallback
    document.getElementById('section-setup').style.display = '';
    document.getElementById('section-app').style.display = 'none';
    if (stored && expired) {
      ['sp_token','sp_token_expiry'].forEach(k => localStorage.removeItem(k));
      setStatus('פג תוקף החיבור. התחברו שוב.', 'error');
    }
  }
};

async function startAuth() {
  const id = document.getElementById('client-id-input').value.trim();
  if (!id) { setStatus('נא להזין את ה־Client ID של Spotify.', 'error'); return; }
  localStorage.setItem('sp_client_id', id);
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem('sp_pkce_verifier', verifier);
  const redir = window.location.href.split('?')[0].split('#')[0];
  window.location.href = `https://accounts.spotify.com/authorize?response_type=code`
    + `&client_id=${encodeURIComponent(id)}`
    + `&scope=${encodeURIComponent(SCOPES)}`
    + `&redirect_uri=${encodeURIComponent(redir)}`
    + `&code_challenge_method=S256`
    + `&code_challenge=${challenge}`;
}

async function exchangeCode(code) {
  const verifier = localStorage.getItem('sp_pkce_verifier');
  const id       = localStorage.getItem('sp_client_id');
  const redir    = window.location.href.split('?')[0].split('#')[0];

  if (!verifier || !id) {
    setStatus('שגיאת אימות. נסו להתחבר שוב.', 'error');
    return;
  }

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type:    'authorization_code',
        code,
        redirect_uri:  redir,
        client_id:     id,
        code_verifier: verifier
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.error || JSON.stringify(data));
    accessToken = data.access_token;
    localStorage.setItem('sp_token',        accessToken);
    localStorage.setItem('sp_token_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('sp_refresh_token', data.refresh_token);
    localStorage.removeItem('sp_pkce_verifier');
    initApp();
  } catch(e) {
    setStatus('החיבור נכשל: ' + e.message + '. נסו להתחבר שוב.', 'error');
  }
}

function logout() {
  userStartedPlayback = false;
  episodeEndHandled = false;
  clearEndTimer();
  ['sp_token','sp_token_expiry','sp_refresh_token','sp_pkce_verifier'].forEach(k => localStorage.removeItem(k));
  accessToken = null;
  if (player) { player.disconnect(); player = null; }
  stopProgressInterval();
  document.getElementById('section-setup').style.display = '';
  document.getElementById('section-app').style.display = 'none';
}

async function initApp() {
  document.getElementById('section-setup').style.display = 'none';
  document.getElementById('section-app').style.display = 'block';
  await fetchUser();
  initPlayer();
  initFavorites();
}

async function fetchUser() {
  try {
    const res = await spotifyFetch('https://api.spotify.com/v1/me');
    if (!res.ok) throw new Error();
    const d = await res.json();
    document.getElementById('user-bar').classList.add('visible');
    document.getElementById('user-name').textContent = d.display_name || d.id;
    document.getElementById('user-plan').textContent = d.product === 'premium' ? 'פרימיום' : d.product;
    if (d.images?.[0]) document.getElementById('user-avatar').src = d.images[0].url;
  } catch { localStorage.removeItem('sp_token'); location.reload(); }
}

window.onSpotifyWebPlaybackSDKReady = () => { if (accessToken) initPlayer(); };

// Tap the collapsed mini bar to scroll to search
document.addEventListener('DOMContentLoaded', () => {
  const mini = document.getElementById('player-mini');
  if (mini) {
    mini.parentElement.addEventListener('click', (e) => {
      if (document.getElementById('player-card').classList.contains('no-episode')) {
        document.getElementById('search-input')?.focus();
        document.getElementById('search-input')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  }
});

function initPlayer() {
  if (player) return;
  player = new Spotify.Player({ name: 'Story Looper', getOAuthToken: cb => cb(accessToken), volume: 0.7 });
  player.addListener('ready', ({ device_id }) => { deviceId = device_id; setAppStatus('בחרו סיפור או פרק...', ''); });
  player.addListener('not_ready', () => setAppStatus('הנגן התנתק', 'error'));
  player.addListener('player_state_changed', state => {
    if (!state) return;
    isPlaying = !state.paused; positionMs = state.position;
    if (state.duration) currentEpisodeDurationMs = state.duration;
    updatePlayPauseIcon(); updateProgress();
    // Only arm repeat engine after user explicitly started an episode
    if (!userStartedPlayback) return;
    if (state.track_window?.current_track?.uri !== currentEpisodeUri) return;
    // Re-arm end timer with fresh position
    if (isPlaying && currentEpisodeDurationMs) {
      scheduleEpisodeEnd(currentEpisodeDurationMs, positionMs);
    }
    // Belt-and-suspenders: catch end via state change
    // Only fire if well into the episode (>10s played) to avoid false positive at position=0 on load
    if (state.paused && state.position === 0 && state.duration > 0 && positionMs > 10000 && !episodeEndHandled) {
      handleEpisodeEnd();
    }
  });
  player.addListener('initialization_error', ({ message }) => setAppStatus(message, 'error'));
  player.addListener('authentication_error', () => { localStorage.removeItem('sp_token'); location.reload(); });
  player.addListener('account_error', ({ message }) => setAppStatus('נדרש Premium: ' + message, 'error'));
  player.connect();
}

async function searchEpisodes() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  setAppStatus('<span class="spinner"></span> מחפשים...', '');
  try {
    const res = await spotifyFetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=episode&limit=8&market=from_token`);
    const data = await res.json();
    renderResults(data.episodes?.items || []);
    setAppStatus('', '');
  } catch(e) { setAppStatus('החיפוש נכשל: ' + e.message, 'error'); }
}

function renderResults(episodes) {
  const list = document.getElementById('results-list');
  const box  = document.getElementById('results');
  if (!episodes.length) {
    list.innerHTML = '<div style="padding:18px;font-size:0.8rem;color:var(--text-dim);text-align:center">לא נמצאו פרקים.</div>';
    box.classList.add('visible'); return;
  }
  list.innerHTML = episodes.map(ep => `
    <div class="result-item" onclick="selectEpisode(${JSON.stringify({
      uri:ep.uri, name:ep.name, show:ep.show?.name||'', image:ep.images?.[0]?.url||'', durationMs:ep.duration_ms
    }).replace(/"/g,'&quot;')})">
      <img src="${ep.images?.[1]?.url||ep.images?.[0]?.url||''}" alt="" loading="lazy"/>
      <div class="result-meta">
        <strong>${esc(ep.name)}</strong>
        <span>${esc(ep.show?.name||'')} &middot; ${fmtMs(ep.duration_ms)}</span>
      </div>
      <div class="result-duration">${fmtMs(ep.duration_ms)}</div>
    </div>`).join('');
  box.classList.add('visible');
}

async function selectEpisodeObj(ep) {
  if (!deviceId) { setAppStatus('הנגן עדיין לא מוכן, המתינו רגע...', 'error'); return; }
  currentEpisodeUri = ep.uri; currentEpisodeDurationMs = ep.durationMs || 0; repeatCount = 0; updateLoopStatus();
  document.getElementById('ep-name').textContent = ep.name;
  document.getElementById('ep-show').textContent = ep.show;
  const _ec=document.getElementById('ep-cover'),_ep=document.getElementById('ep-cover-placeholder');
  if(ep.image){_ec.src=ep.image;_ec.style.display='block';_ep.style.display='none';}else{_ec.src='';_ec.style.display='none';_ep.style.display='flex';}
  document.getElementById('player-card').classList.remove('no-episode');
  document.getElementById('results').classList.remove('visible');
  // playlist button removed in Variant D
  renderFavorites();
  updateSaveHearts();
  setAppStatus('', '');
  await playEpisode(ep.startMs || 0);
}

async function selectEpisode(ep) {
  await selectEpisodeObj(ep);
}

async function playEpisode(startMs = 0) {
  try {
    episodeEndHandled = false;
    userStartedPlayback = true;
    clearEndTimer();
    const res = await spotifyFetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,
      { method:'PUT', body:JSON.stringify({ uris:[currentEpisodeUri], position_ms: startMs }) });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||res.status); }
    startProgressInterval();
    setAppStatus('', '');
    // Wait briefly for Spotify to confirm playback, then arm the end timer
    setTimeout(async () => {
      if (!currentEpisodeDurationMs) {
        // Fetch duration from API if SDK hasn't reported it yet
        try {
          const r = await spotifyFetch('https://api.spotify.com/v1/me/player?market=from_token');
          if (r.ok && r.status !== 204) {
            const d = await r.json();
            if (d.item?.duration_ms) currentEpisodeDurationMs = d.item.duration_ms;
          }
        } catch(e) {}
      }
      scheduleEpisodeEnd(currentEpisodeDurationMs, startMs);
    }, 2000);
  } catch(e) { setAppStatus('שגיאת ניגון: ' + e.message, 'error'); }
}

async function togglePlayPause() { if (player) await player.togglePlay(); }
async function skip(s) {
  if (!player) return;
  const state = await player.getCurrentState(); if (!state) return;
  await player.seek(Math.max(0, Math.min(state.position + s*1000, state.duration)));
}
async function restartEpisode() { if (player) await player.seek(0); }
async function skipToEnd() { if (player && currentEpisodeDurationMs) await player.seek(Math.max(0, currentEpisodeDurationMs-3000)); }
async function seekTo(evt) {
  if (!player || !currentEpisodeDurationMs) return;
  const r = document.getElementById('progress-track').getBoundingClientRect();
  await player.seek(Math.floor(((evt.clientX-r.left)/r.width)*currentEpisodeDurationMs));
}
async function setVolume(v) { if (player) await player.setVolume(v/100); }

function toggleUnlimited() {
  loopUnlimited = !loopUnlimited;
  const t = document.getElementById('unlimited-toggle');
  loopUnlimited ? t.classList.add('on') : t.classList.remove('on');
  document.getElementById('repeat-count').disabled = loopUnlimited;
  updateLoopStatus();
}

function adjustRepeat(delta) {
  const inp = document.getElementById('repeat-count');
  const val = Math.max(1, Math.min(999, (parseInt(inp.value) || 3) + delta));
  inp.value = val;
  updateLoopStatus();
}

function updateLoopStatus() {
  const el = document.getElementById('loop-status');
  repeatTarget = parseInt(document.getElementById('repeat-count').value)||3;
  if (!currentEpisodeUri) { el.textContent=''; return; }
  if (loopUnlimited) el.textContent = `${repeatCount} ×`;
  else el.textContent = `${repeatCount}/${repeatTarget}`;
}

// ── RELIABLE REPEAT ENGINE ──
// Strategy: schedule a setTimeout for exactly when the episode should end,
// based on (duration - currentPosition). Falls back to player_state_changed.
// On tab visibility restore, re-sync against the Spotify API (not SDK) to
// recover from background throttling.

let endTimer = null;
let episodeEndHandled = false;
let userStartedPlayback = false; // only arm repeat after user explicitly plays

function scheduleEpisodeEnd(durationMs, posMs) {
  clearEndTimer();
  if (!durationMs || durationMs <= 0) return;
  const remaining = Math.max(0, durationMs - posMs);
  // Add a small buffer to avoid firing slightly early
  endTimer = setTimeout(() => verifyAndHandleEnd(), remaining + 800);
}

function clearEndTimer() {
  if (endTimer) { clearTimeout(endTimer); endTimer = null; }
}

async function verifyAndHandleEnd() {
  if (!userStartedPlayback || !currentEpisodeUri) return;
  // Double-check via the REST API — immune to background throttling
  try {
    const res = await spotifyFetch('https://api.spotify.com/v1/me/player?market=from_token');
    if (res.status === 204 || !res.ok) {
      // No active player — only treat as end if we were actually playing
      if (userStartedPlayback) await handleEpisodeEnd();
      return;
    }
    const data = await res.json();
    const item = data.item;
    const progress = data.progress_ms || 0;
    const duration = item?.duration_ms || 0;
    const playing = data.is_playing;
    const isOurEpisode = item?.uri === currentEpisodeUri;

    if (!playing && isOurEpisode && duration > 0 && progress >= duration - 2000) {
      // Genuinely ended
      await handleEpisodeEnd();
    } else if (playing && isOurEpisode) {
      // Still playing (maybe we fired early) — reschedule
      scheduleEpisodeEnd(duration, progress);
      // Sync UI
      positionMs = progress;
      currentEpisodeDurationMs = duration;
      updateProgress();
    } else if (!isOurEpisode) {
      // Spotify moved to something else — treat as end
      await handleEpisodeEnd();
    } else {
      // Paused but not at end — user paused it
      updateProgress();
    }
  } catch(e) {
    // Network error — try again in 3s
    endTimer = setTimeout(() => verifyAndHandleEnd(), 3000);
  }
}

async function handleEpisodeEnd() {
  clearEndTimer();
  episodeEndHandled = true;
  repeatCount++;
  repeatTarget = parseInt(document.getElementById('repeat-count').value)||3;
  updateLoopStatus();
  if (loopUnlimited || repeatCount < repeatTarget) {
    episodeEndHandled = false;
    await playEpisode();
  } else {
    setAppStatus(`חלומות מתוקים... הושמע ${repeatCount} פעמים הלילה`, 'success');
    isPlaying = false; updatePlayPauseIcon(); stopProgressInterval();
  }
}

// Light 5-second poll just for UI updates — not for end detection
function startProgressInterval() {
  stopProgressInterval();
  progressInterval = setInterval(pollProgress, 5000);
}
function stopProgressInterval() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  clearEndTimer();
}

async function pollProgress() {
  if (!player) return;
  const state = await player.getCurrentState(); if (!state) return;
  isPlaying = !state.paused; positionMs = state.position; currentEpisodeDurationMs = state.duration;
  updatePlayPauseIcon(); updateProgress();
}

// Re-sync when tab becomes visible again after being in background
document.addEventListener('visibilitychange', async () => {
  if (document.hidden || !currentEpisodeUri || !accessToken) return;
  try {
    const res = await spotifyFetch('https://api.spotify.com/v1/me/player?market=from_token');
    if (!res.ok || res.status === 204) return;
    const data = await res.json();
    const item = data.item;
    const progress = data.progress_ms || 0;
    const duration = item?.duration_ms || 0;
    const playing = data.is_playing;
    const isOurEpisode = item?.uri === currentEpisodeUri;

    positionMs = progress;
    if (duration) currentEpisodeDurationMs = duration;
    isPlaying = playing;
    updatePlayPauseIcon();
    updateProgress();

    if (isOurEpisode && playing) {
      // Still going — re-arm the end timer from current position
      scheduleEpisodeEnd(duration, progress);
    } else if (isOurEpisode && !playing && progress >= duration - 2000 && duration > 0) {
      // Ended while we were in background
      if (!episodeEndHandled) await handleEpisodeEnd();
    }
  } catch(e) {}
});

function updateProgress() {
  if (!currentEpisodeDurationMs) return;
  document.getElementById('progress-fill').style.width = ((positionMs/currentEpisodeDurationMs)*100)+'%';
  document.getElementById('time-cur').textContent = fmtMs(positionMs);
  document.getElementById('time-dur').textContent = fmtMs(currentEpisodeDurationMs);
}

function updatePlayPauseIcon() {
  document.getElementById('icon-play').classList.toggle('hidden', isPlaying);
  document.getElementById('icon-pause').classList.toggle('hidden', !isPlaying);
}

function spotifyFetch(url, opts={}) {
  return fetch(url, { ...opts, headers: { 'Authorization':`Bearer ${accessToken}`, 'Content-Type':'application/json', ...(opts.headers||{}) } });
}
function fmtMs(ms) { const t=Math.floor(ms/1000),m=Math.floor(t/60),s=t%60; return `${m}:${String(s).padStart(2,'0')}`; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setStatus(msg, type='') {
  const el=document.getElementById('status'); el.innerHTML=msg;
  el.className = type==='error'?'error-text':type==='success'?'success-text':'';
}
function setAppStatus(msg, type='') {
  const el=document.getElementById('app-status'); el.innerHTML=msg;
  el.className = type==='error'?'error-text':type==='success'?'success-text':'';
}

// ── SCROLL-HIDE HEADER ON MOBILE ──
(function() {
  let lastScrollY = 0;
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const header = document.querySelector('header');
        if (!header) { ticking = false; return; }
        const isMobile = window.innerWidth <= 480;
        if (isMobile) {
          if (window.scrollY > lastScrollY && window.scrollY > 60) {
            header.classList.add('hidden-header');
          } else {
            header.classList.remove('hidden-header');
          }
        } else {
          header.classList.remove('hidden-header');
        }
        lastScrollY = window.scrollY;
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();

// ── TAP OUTSIDE TO DISMISS RESULTS / BROWSE ──
document.addEventListener('click', (e) => {
  const results = document.getElementById('results');
  const browse = document.getElementById('browse-panel');
  if (results?.classList.contains('visible') &&
      !results.contains(e.target) &&
      !document.getElementById('search-input')?.contains(e.target) &&
      !e.target.closest('.btn-search')) {
    results.classList.remove('visible');
  }
  if (browse?.classList.contains('visible') &&
      !browse.contains(e.target) &&
      !e.target.closest('[onclick*="toggleBrowse"]')) {
    browse.classList.remove('visible');
    browseVisible = false;
  }
}, { passive: true });
