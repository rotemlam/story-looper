<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
<title>Story Looper</title>
<style>
  :root {
    --navy:       #0d1b2a;
    --navy2:      #122236;
    --navy3:      #1a3050;
    --brown:      #5c3d2e;
    --brown2:     #7a5240;
    --brown-warm: #a0694a;
    --pink:       #d4849a;
    --pink-soft:  #e8b4c0;
    --pink-pale:  #f2d5dc;
    --cream:      #f5ede8;
    --gold:       #c9a96e;
    --gold-soft:  #e8cc99;
    --text:       #f0e6e0;
    --text-dim:   #a89890;
    --border:     rgba(212,132,154,0.15);
    --border2:    rgba(212,132,154,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(26,48,80,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(212,132,154,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 30% 20% at 20% 60%, rgba(201,169,110,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 12%, rgba(245,237,232,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(245,237,232,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 22%, rgba(245,237,232,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 35%, rgba(245,237,232,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 6%  40%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 5%,  rgba(245,237,232,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 32% 50%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 91% 15%, rgba(201,169,110,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 30%, rgba(201,169,110,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 79% 55%, rgba(245,237,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 3%  18%, rgba(245,237,232,0.5) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 44px;
  }

  .moon-icon {
    font-size: 2.6rem;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 16px rgba(201,169,110,0.5));
    animation: moonFloat 4s ease-in-out infinite;
  }

  @keyframes moonFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-6px); }
  }

  header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 6px;
  }

  header h1 em {
    font-style: italic;
    color: var(--pink-soft);
    font-weight: 400;
  }

  header p {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* CARDS */
  .card {
    background: linear-gradient(145deg, rgba(18,34,54,0.97) 0%, rgba(13,27,42,0.99) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 24px;
    margin-bottom: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(245,237,232,0.04);
  }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(201,169,110,0.25), transparent);
  }

  /* INFO BOX */
  .info-box {
    background: rgba(92,61,46,0.12);
    border: 1px solid rgba(201,169,110,0.18);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .info-box strong-label {
    display: block;
    color: var(--gold-soft);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .info-box a { color: var(--pink-soft); text-decoration: none; }
  .info-box a:hover { text-decoration: underline; }
  .info-box ol { padding-left: 16px; }
  .info-box li { margin-bottom: 3px; }

  /* FIELDS */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
    font-weight: 600;
  }

  .field input {
    width: 100%;
    background: rgba(13,27,42,0.8);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .field input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(212,132,154,0.1);
  }

  .field input::placeholder { color: rgba(168,152,144,0.45); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink) 0%, #b85c74 100%);
    color: #fff;
    width: 100%;
    box-shadow: 0 4px 16px rgba(212,132,154,0.3);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--pink-soft) 0%, var(--pink) 100%);
    box-shadow: 0 6px 24px rgba(212,132,154,0.4);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 0.76rem;
    padding: 7px 14px;
  }

  .btn-ghost:hover { border-color: var(--pink); color: var(--pink-soft); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* USER BAR */
  #user-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(18,34,54,0.6);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 14px;
  }

  #user-bar.visible { display: flex; }

  .user-info { display: flex; align-items: center; gap: 10px; }

  #user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--navy2);
    border: 1px solid var(--border);
  }

  #user-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

  #user-plan {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    background: rgba(201,169,110,0.1);
    border: 1px solid rgba(201,169,110,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* SEARCH */
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .search-input {
    flex: 1;
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 12px 18px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .search-input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(212,132,154,0.1);
  }

  .search-input::placeholder { color: rgba(168,152,144,0.45); }

  .btn-search {
    background: linear-gradient(135deg, var(--brown-warm) 0%, var(--brown) 100%);
    color: var(--cream);
    padding: 12px 18px;
    border-radius: 14px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(92,61,46,0.3);
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  .btn-search:hover {
    background: linear-gradient(135deg, #b8795a 0%, var(--brown-warm) 100%);
    transform: translateY(-1px);
  }

  .btn-search:active { transform: scale(0.96); }

  /* RESULTS */
  #results {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  #results.visible { display: block; }

  #results h3 {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border2);
    font-weight: 700;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 1px solid var(--border2);
  }

  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(212,132,154,0.06); }

  .result-item img {
    width: 48px; height: 48px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--navy2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .result-meta { flex: 1; min-width: 0; }

  .result-meta strong {
    display: block;
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .result-meta span { font-size: 0.72rem; color: var(--text-dim); }
  .result-duration  { font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; }

  /* PLAYER CARD */
  #player-card {
    background: linear-gradient(160deg, rgba(22,38,60,0.98) 0%, rgba(13,27,42,1) 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    display: block;
    position: relative;
    overflow: hidden;
    direction: ltr;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(245,237,232,0.04);
  }

  #player-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(212,132,154,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  #player-card::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* player always visible — no-episode class controls empty state */

  .now-playing-label {
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    color: var(--pink-soft);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .breathe-dot {
    width: 6px; height: 6px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--pink);
    animation: breathe 2.5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.6); }
  }

  .episode-row {
    display: flex;
    gap: 16px;
    margin-bottom: 22px;
    align-items: center;
    position: relative;
    z-index: 1;
  }



  .episode-text { flex: 1; min-width: 0; }

  #ep-name {
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.4;
    color: var(--cream);
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #ep-show { font-size: 0.74rem; color: var(--text-dim); font-weight: 300; }

  /* Progress */
  .progress-area { margin-bottom: 20px; position: relative; z-index: 1; }

  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(245,237,232,0.08);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--pink), var(--gold));
    border-radius: 2px;
    width: 0%;
    transition: width 0.8s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 9px; height: 9px;
    background: var(--pink-pale);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(212,132,154,0.6);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    display: grid;
    place-items: center;
    transition: color 0.2s, transform 0.15s;
    padding: 0;
    border-radius: 50%;
  }

  .ctrl-btn:hover { color: var(--pink-soft); transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.9); }

  .ctrl-btn.main {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--pink) 0%, #a85068 100%);
    color: #fff;
    box-shadow: 0 6px 20px rgba(212,132,154,0.4);
    transition: box-shadow 0.2s, transform 0.15s;
  }

  .ctrl-btn.main:hover {
    box-shadow: 0 8px 28px rgba(212,132,154,0.55);
    transform: scale(1.06);
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0 0;
    border-top: 1px solid var(--border2);
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .volume-icon { color: var(--text-dim); flex-shrink: 0; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: rgba(245,237,232,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--pink-pale);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(212,132,154,0.5);
  }

  /* Loop */
  .loop-config {
    background: rgba(13,27,42,0.5);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    z-index: 1;
  }

  .loop-config h4 {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .loop-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .loop-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-track {
    width: 34px; height: 18px;
    background: rgba(245,237,232,0.08);
    border-radius: 9px;
    position: relative;
    transition: background 0.25s;
    border: 1px solid rgba(245,237,232,0.06);
    flex-shrink: 0;
  }

  .toggle-track.on {
    background: linear-gradient(135deg, var(--pink) 0%, #a85068 100%);
    border-color: transparent;
  }

  .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.25s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .toggle-track.on .toggle-knob { left: 18px; }

  .loop-toggle span { font-size: 0.82rem; color: var(--text); font-weight: 400; }

  .divider-v {
    width: 1px; height: 18px;
    background: var(--border);
    flex-shrink: 0;
  }

  .count-row { display: flex; align-items: center; gap: 8px; }
  .count-row label { font-size: 0.82rem; color: var(--text-dim); }

  .count-input {
    width: 56px;
    background: rgba(13,27,42,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 5px 8px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  .count-input:focus { border-color: var(--pink); }
  .count-input:disabled { opacity: 0.3; }

  .loop-status {
    font-size: 0.73rem;
    color: var(--pink-soft);
    margin-top: 10px;
    min-height: 16px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* FAVORITES */
  .favorites-section {
    margin-bottom: 14px;
  }

  .favorites-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .favorites-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(201,169,110,0.25), transparent);
  }

  .favorites-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .fav-slot {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    min-height: 88px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .fav-slot:hover { border-color: var(--pink); transform: translateY(-1px); }
  .fav-slot:active { transform: scale(0.97); }

  .fav-slot.empty {
    border-style: dashed;
    border-color: rgba(212,132,154,0.2);
    cursor: default;
    align-items: center;
    justify-content: center;
  }

  .fav-slot.empty:hover { border-color: rgba(212,132,154,0.4); transform: none; }

  .fav-slot.active {
    border-color: var(--pink);
    background: linear-gradient(145deg, rgba(212,132,154,0.08), rgba(13,27,42,0.99));
  }

  .fav-cover {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    object-fit: cover;
    background: var(--navy2);
    display: block;
    flex-shrink: 0;
  }

  .fav-title {
    font-size: 0.7rem;
    color: var(--cream);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .fav-show {
    font-size: 0.62rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fav-actions {
    display: flex;
    gap: 5px;
    margin-top: auto;
  }

  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px;
    border-radius: 5px;
    color: var(--text-dim);
    transition: color 0.15s, background 0.15s;
    line-height: 0;
  }

  .fav-btn:hover { color: var(--pink-soft); background: rgba(212,132,154,0.1); }
  .fav-btn.save-btn {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-dim);
    line-height: 1;
    padding: 4px 6px;
  }
  .fav-btn.save-btn:hover { color: var(--gold); background: rgba(201,169,110,0.1); }
  .fav-btn.save-btn svg { flex-shrink: 0; display: block; }

  .fav-empty-icon {
    font-size: 1.4rem;
    opacity: 0.25;
    display: block;
    margin-bottom: 4px;
  }

  .fav-empty-text {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
    opacity: 0.5;
  }

  .fav-num {
    position: absolute;
    top: 7px; left: 8px;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    font-weight: 700;
    opacity: 0.7;
  }

  /* Status */
  #status, #app-status {
    font-size: 0.76rem;
    color: var(--text-dim);
    text-align: center;
    padding: 8px;
    min-height: 32px;
    font-weight: 300;
  }

  .error-text   { color: #e07878 !important; }
  .success-text { color: var(--gold-soft) !important; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(212,132,154,0.2);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  #section-setup, #section-app { width: 100%; }
  #section-app { display: none; }

  /* ── RTL ADJUSTMENTS ── */
  .card-label::after,
  .favorites-label::after {
    background: linear-gradient(to left, rgba(201,169,110,0.25), transparent);
  }

  .search-input {
    text-align: right;
  }

  .search-input::placeholder {
    text-align: right;
    direction: rtl;
  }

  .field input::placeholder {
    text-align: right;
    direction: rtl;
  }

  .info-box ol {
    padding-right: 16px;
    padding-left: 0;
  }

  .now-playing-label {
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .now-playing-label > div:first-child {
    order: 1;
  }

  .now-playing-label > span,
  .now-playing-label > .breathe-dot {
    margin-right: 0;
  }

  .fav-num {
    left: auto;
    right: 8px;
  }

  .fav-btn.save-btn {
    margin-left: 0;
    margin-right: auto;
  }

  .loop-status {
    text-align: right;
  }

  .time-row {
    direction: ltr; /* keep times left-to-right */
  }

  #user-plan {
    margin-left: 0;
    margin-right: 6px;
  }

  .volume-row {
    direction: ltr;
  }

  /* LINK INPUT */
  .link-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .link-input {
    flex: 1;
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.82rem;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    direction: ltr;
    text-align: left;
  }
  .link-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.1); }
  .link-input::placeholder { color: rgba(168,152,144,0.4); direction: ltr; text-align: left; }
  .btn-link {
    background: linear-gradient(135deg, rgba(201,169,110,0.3) 0%, rgba(201,169,110,0.15) 100%);
    color: var(--gold-soft);
    padding: 11px 16px;
    border-radius: 14px;
    flex-shrink: 0;
    border: 1px solid rgba(201,169,110,0.25);
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
  }
  .btn-link:hover { background: linear-gradient(135deg, rgba(201,169,110,0.4), rgba(201,169,110,0.25)); transform: translateY(-1px); }
  .btn-link:active { transform: scale(0.96); }

  /* BROWSE PANEL */
  #browse-panel {
    background: linear-gradient(145deg, rgba(18,34,54,0.97), rgba(13,27,42,0.99));
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 14px;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  #browse-panel.visible { display: block; }
  .browse-tabs {
    display: flex;
    border-bottom: 1px solid var(--border2);
    padding: 0 6px;
  }
  .browse-tab {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.05em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .browse-tab.active { color: var(--pink-soft); border-bottom-color: var(--pink); }
  .browse-tab:hover:not(.active) { color: var(--text); }
  .browse-list { max-height: 260px; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .browse-list::-webkit-scrollbar { width: 4px; }
  .browse-list::-webkit-scrollbar-track { background: transparent; }
  .browse-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .browse-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border2);
  }
  .browse-item:last-child { border-bottom: none; }
  .browse-item:hover { background: rgba(212,132,154,0.06); }
  .browse-item img {
    width: 42px; height: 42px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--navy2);
  }
  .browse-item-meta { flex: 1; min-width: 0; }
  .browse-item-meta strong {
    display: block;
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .browse-item-meta span { font-size: 0.7rem; color: var(--text-dim); }
  .browse-header {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    padding: 12px 18px 8px;
    border-bottom: 1px solid var(--border2);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .browse-header:hover { color: var(--gold-soft); }
  .browse-back {
    font-size: 0.75rem;
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  /* HEART SAVE BUTTONS — filled when slot occupied */
  .fav-btn.save-btn svg.heart-empty { display: block; }
  .fav-btn.save-btn svg.heart-filled { display: none; }
  .fav-btn.save-btn.occupied svg.heart-empty { display: none; }
  .fav-btn.save-btn.occupied svg.heart-filled { display: block; }
  .fav-btn.save-btn.occupied { color: var(--pink); }
  .fav-btn.save-btn.occupied:hover { color: var(--gold); }



  /* PLAYLIST SAVE BUTTON */
  .playlist-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border2);
    position: relative;
    z-index: 1;
  }
  .btn-playlist {
    flex: 1;
    background: linear-gradient(135deg, rgba(29,185,84,0.15) 0%, rgba(29,185,84,0.08) 100%);
    border: 1px solid rgba(29,185,84,0.25);
    border-radius: 10px;
    color: #1db954;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 9px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-playlist:hover { background: linear-gradient(135deg, rgba(29,185,84,0.25), rgba(29,185,84,0.15)); transform: translateY(-1px); }
  .btn-playlist:active { transform: scale(0.97); }
  .btn-playlist.done { color: var(--gold-soft); border-color: rgba(201,169,110,0.3); background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(201,169,110,0.06)); }

  /* PREVIEW */
  .preview-wrap {
    position: relative;
    margin-bottom: 16px;
    border-radius: 20px;
    overflow: hidden;
  }

  .preview-ui {
    filter: blur(3px);
    opacity: 0.45;
    pointer-events: none;
    user-select: none;
    transform: scale(0.98);
    transform-origin: top center;
  }

  .preview-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: radial-gradient(ellipse at center, rgba(13,27,42,0.55) 0%, rgba(13,27,42,0.2) 100%);
    border-radius: 20px;
    pointer-events: none;
  }

  .preview-lock {
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    animation: moonFloat 4s ease-in-out infinite;
  }

  .preview-hint {
    font-size: 0.72rem;
    color: var(--pink-pale);
    letter-spacing: 0.1em;
    font-weight: 300;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }

  /* EMPTY PLAYER STATE */
  #player-card.no-episode .breathe-dot { opacity: 0; }
  #player-card.no-episode .now-playing-label { color: var(--text-dim); }
  #player-card.no-episode #ep-name { color: var(--text-dim); font-style: normal; font-size: 0.88rem; }
  #player-card.no-episode #ep-show { opacity: 0.6; font-size: 0.72rem; }
  #player-card.no-episode .progress-fill { width: 0% !important; }
  #player-card.no-episode .progress-fill::after { display: none; }
  #player-card.no-episode .ctrl-btn.main { opacity: 0.35; pointer-events: none; }
  #player-card.no-episode .progress-track { pointer-events: none; }

  /* ══════════════════════════════════════════
     MOBILE OPTIMIZATIONS
     ══════════════════════════════════════════ */

  /* Remove hover effects on touch devices — they stick and look broken */
  @media (hover: none) {
    .fav-slot:hover        { transform: none; border-color: var(--border); }
    .fav-slot.active:hover { border-color: var(--pink); }
    .fav-slot.empty:hover  { border-color: rgba(212,132,154,0.2); }
    .ctrl-btn:hover        { transform: none; color: var(--text-dim); }
    .ctrl-btn.main:hover   { transform: none; box-shadow: 0 6px 20px rgba(212,132,154,0.4); }
    .btn-primary:hover     { transform: none; }
    .btn-search:hover      { transform: none; }
    .btn-link:hover        { transform: none; }
    .btn-playlist:hover    { transform: none; }
    .browse-item:hover     { background: transparent; }
    .result-item:hover     { background: transparent; }
  }

  /* Larger touch targets for all interactive elements */
  @media (pointer: coarse) {
    .ctrl-btn         { min-width: 44px; min-height: 44px; }
    .fav-btn          { min-width: 36px; min-height: 36px; padding: 8px; }
    .btn-search       { padding: 14px 16px; }
    .btn-link         { padding: 14px 16px; }
    .browse-tab       { padding: 14px 8px; }
    .result-item      { padding: 14px 16px; }
    .browse-item      { padding: 13px 16px; }
    input[type=range] { height: 20px; }
    input[type=range]::-webkit-slider-thumb { width: 22px; height: 22px; }
  }

  @media (max-width: 480px) {

    /* Tighter body padding */
    body { padding: 24px 14px 100px; }

    /* Smaller header */
    .moon-icon  { font-size: 2rem; margin-bottom: 8px; }
    header h1   { font-size: 1.6rem; }
    header      { margin-bottom: 28px; }

    /* Cards */
    .card { padding: 20px 16px; }
    #player-card { padding: 20px 16px 18px; border-radius: 20px; }

    /* Search row — browse button stacks neatly */
    .search-row { gap: 6px; }
    .search-input { font-size: 1rem; padding: 13px 14px; border-radius: 12px; }
    .btn-search { padding: 13px 14px; border-radius: 12px; }

    /* Link row */
    .link-input { font-size: 0.9rem; padding: 13px 14px; border-radius: 12px; }
    .btn-link   { padding: 13px 14px; font-size: 0.85rem; border-radius: 12px; }

    /* Favorites grid — slightly larger cards */
    .favorites-grid { gap: 8px; }
    .fav-slot { padding: 10px; border-radius: 12px; }
    .fav-title { font-size: 0.68rem; }

    /* Episode row — smaller cover on small screens */
    .episode-row { gap: 12px; margin-bottom: 16px; }
    #ep-cover-wrap { width: 62px; height: 62px; border-radius: 12px; }
    #ep-cover { border-radius: 12px; }
    #ep-name  { font-size: 0.92rem; }
    #ep-show  { font-size: 0.7rem; }

    /* Progress */
    .progress-area { margin-bottom: 16px; }
    .progress-track { height: 4px; }
    .progress-fill::after { width: 12px; height: 12px; top: -4px; right: -6px; }

    /* Controls — more spacing, bigger main button */
    .controls { gap: 12px; margin-bottom: 16px; }
    .ctrl-btn.main { width: 62px; height: 62px; }
    .ctrl-btn.main svg { width: 26px; height: 26px; }
    .ctrl-btn svg { width: 24px; height: 24px; }

    /* Now-playing label — wrap gracefully */
    .now-playing-label { flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

    /* Loop config */
    .loop-config { padding: 14px 14px; border-radius: 12px; }
    .loop-row { gap: 10px; }
    .count-input { width: 52px; font-size: 1rem; }

    /* Volume */
    .volume-row { padding: 12px 0 0; margin-bottom: 12px; }

    /* Playlist button */
    .btn-playlist { font-size: 0.82rem; padding: 11px 12px; border-radius: 10px; }
    .playlist-row { margin-top: 10px; padding-top: 10px; }

    /* Browse panel */
    .browse-tab { font-size: 0.8rem; padding: 13px 6px; }
    .browse-list { max-height: 220px; }
    .browse-item img { width: 38px; height: 38px; }
    .browse-item-meta strong { font-size: 0.82rem; }

    /* Results */
    .result-item img { width: 42px; height: 42px; }
    .result-meta strong { font-size: 0.82rem; }

    /* User bar */
    #user-bar { padding: 9px 12px; border-radius: 12px; }
    #user-name { font-size: 0.82rem; }

    /* Status */
    #app-status { font-size: 0.8rem; }

    /* Preview mock */
    .preview-hint { font-size: 0.78rem; }
  }

  /* Very small screens (320px) */
  @media (max-width: 360px) {
    body { padding: 20px 10px 100px; }
    header h1 { font-size: 1.4rem; }
    .ctrl-btn.main { width: 56px; height: 56px; }
    .controls { gap: 8px; }
    #ep-cover { width: 54px; height: 54px; }
    .count-input { width: 46px; }
    .fav-slot { padding: 8px; }
  }

  /* ── FIX 5: DYNAMIC VIEWPORT + SAFE AREA ── */
  /* Use dvh (dynamic viewport height) where supported — accounts for
     iOS Safari toolbar showing/hiding and keyboard appearance */
  @supports (min-height: 100dvh) {
    body { min-height: 100dvh; }
    #section-app { min-height: 100dvh; }
  }

  /* Enhanced safe-area handling */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    body {
      padding-bottom: max(80px, calc(60px + env(safe-area-inset-bottom)));
    }
    /* When player is sticky, its own bottom padding handles safe area */
    @media (max-width: 480px) {
      body { padding-bottom: 0 !important; }
    }
  }

  /* Remove tap highlight on mobile */
  * { -webkit-tap-highlight-color: transparent; }
  button, label, [onclick] { touch-action: manipulation; }

  #ep-cover-wrap {
    width: 76px; height: 76px;
    border-radius: 14px;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(26,48,80,0.8), rgba(13,27,42,0.9));
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  #ep-cover {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 14px;
  }
  #ep-cover-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(168,152,144,0.1);
    border-radius: 14px;
  }

  /* ── MOBILE DESIGN IMPROVEMENTS ── */

  /* Sticky player on mobile — keep it at bottom */
  @media (max-width: 480px) {
    /* Full-width container with less side padding */
    .container { max-width: 100%; }

    /* Search + link inputs: larger font to prevent iOS zoom */
    .search-input,
    .link-input,
    .field input { font-size: 16px; }

    /* Favorites: show title instead of just number */
    .fav-num { font-size: 0.55rem; }

    /* Loop row: stack vertically on small screens */
    .loop-row { flex-direction: column; align-items: flex-start; gap: 12px; }
    .divider-v { display: none; }
    .count-row { width: 100%; justify-content: flex-start; gap: 10px; }

    /* Bigger repeat count input */
    .count-input { width: 60px; font-size: 1.1rem; padding: 7px 8px; }

    /* Loop status clearer */
    .loop-status { font-size: 0.8rem; }

    /* Browse list taller on mobile — uses more screen */
    .browse-list { max-height: 50vh; }

    /* Results list */
    #results { margin-bottom: 14px; }

    /* App status */
    #app-status { padding: 10px 4px; min-height: 38px; font-size: 0.82rem; }

    /* Btn playlist full readable */
    .btn-playlist { font-size: 0.86rem; padding: 13px 14px; }

    /* Volume row — bigger slider thumb area */
    .volume-row { gap: 12px; }
  }

  /* Progress track easier to tap */
  @media (pointer: coarse) {
    .progress-track {
      height: 6px;
      margin-bottom: 10px;
      padding: 8px 0;
      height: auto;
      background: transparent;
      position: relative;
    }
    .progress-track::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%; transform: translateY(-50%);
      height: 4px;
      background: rgba(245,237,232,0.08);
      border-radius: 2px;
    }
    .progress-fill {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      height: 4px;
    }
    .progress-fill::after { width: 16px; height: 16px; top: -6px; right: -8px; }
  }

  /* ── FLOATING PLAYER ON MOBILE ── */
  @media (max-width: 480px) {
    /* Player floats fixed at bottom — truly above everything */
    #player-card {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      border-radius: 20px 20px 0 0;
      border-bottom: none;
      border-left: none;
      border-right: none;
      margin: 0;
      /* Frosted glass effect */
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      background: linear-gradient(180deg,
        rgba(22,38,60,0.92) 0%,
        rgba(13,27,42,0.97) 100%);
      box-shadow:
        0 -2px 0 rgba(212,132,154,0.15),
        0 -20px 60px rgba(0,0,0,0.5),
        0 -4px 20px rgba(13,27,42,0.8);
      /* Safe area for home indicator */
      padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      /* Collapsed height when no episode selected */
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    /* Collapsed state — just show a mini bar */
    #player-card.no-episode {
      max-height: 72px;
      padding-top: 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      cursor: pointer;
    }

    /* Expanded state — full player */
    #player-card:not(.no-episode) {
      max-height: 90dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* App status floats just above player */
    #app-status {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 201;
      pointer-events: none;
      text-align: center;
      font-size: 0.78rem;
      padding: 6px 16px calc(6px + env(safe-area-inset-bottom, 0px));
      background: transparent;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* Push main content up so it's not hidden behind floating player */
    #section-app {
      padding-bottom: calc(var(--player-height, 380px) + env(safe-area-inset-bottom, 0px));
    }

    /* When no episode, less padding needed */
    #section-app:has(#player-card.no-episode) {
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    body { padding-bottom: 0 !important; }
  }

  /* Mini bar content in collapsed state */
  #player-mini {
    display: none;
  }
  @media (max-width: 480px) {
    #player-card.no-episode #player-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      pointer-events: none;
    }
    #player-card.no-episode > *:not(#player-mini) {
      display: none !important;
    }
  }

  /* ── FIX 2: RAISE TINY TEXT ON MOBILE ── */
  @media (max-width: 480px) {
    .card-label,
    .favorites-label,
    .browse-header,
    .loop-config h4,
    .now-playing-label,
    #results h3,
    #user-plan,
    .fav-num,
    .fav-empty-text,
    .fav-show,
    .result-duration,
    .browse-item-meta span,
    .loop-status        { font-size: 0.8rem !important; letter-spacing: 0.06em; }

    /* Slightly larger for key interactive labels */
    .count-row label,
    .loop-toggle span   { font-size: 0.88rem !important; }

    /* Show name under episode title */
    #ep-show            { font-size: 0.78rem !important; }

    /* Time stamps */
    .time-row           { font-size: 0.78rem !important; }
  }

  /* ── FIX 3: WRAP OVERFLOW ROWS ── */
  @media (max-width: 480px) {
    /* User bar: let name + plan wrap instead of overflow */
    #user-bar {
      flex-wrap: wrap;
      gap: 8px;
    }
    .user-info {
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
      gap: 6px;
    }
    #user-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    #user-plan {
      margin-right: 0;
      margin-left: 0;
    }

    /* Search row: input takes full width, buttons share a row below if needed */
    .search-row {
      flex-wrap: nowrap; /* keep on one line but shrink gracefully */
    }
    .search-input {
      min-width: 0; /* allow shrink */
    }
    /* Link row: stack vertically on very narrow screens */
    .link-row {
      flex-wrap: wrap;
      gap: 8px;
    }
    .link-input {
      min-width: 0;
      flex: 1 1 200px;
    }
    .btn-link {
      flex-shrink: 0;
    }
  }

  /* ── FIX 4: 2-COLUMN FAVORITES ON NARROW SCREENS ── */
  @media (max-width: 380px) {
    .favorites-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    /* Make the single filled slot span full width when others are empty */
    .fav-slot:first-child:last-child {
      grid-column: 1 / -1;
    }
  }

  /* ── FIX 6: SCROLL BEHAVIOR ── */
  /* Results panel */
  #results {
    overflow: hidden; /* panel itself clips */
  }
  #results-list {
    max-height: 340px;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* Browse list — enhanced for mobile */
  @media (max-width: 480px) {
    .browse-list {
      max-height: 45vh;
      max-height: 45dvh;
    }
    #results-list {
      max-height: 38vh;
      max-height: 38dvh;
    }
  }

  /* Smooth scroll for the main page */
  html {
    scroll-behavior: smooth;
  }
  .container {
    overscroll-behavior-y: none;
  }

  /* ══════════════════════════════════════════
     MOBILE UX IMPROVEMENTS
     ══════════════════════════════════════════ */

  @media (max-width: 480px) {

    /* ── Scroll-hide header ── */
    header {
      transition: transform 0.3s ease, opacity 0.3s ease;
      will-change: transform;
    }
    header.hidden-header {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    /* ── Pull-to-dismiss results / browse ── */
    #results.visible,
    #browse-panel.visible {
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Active favorite — stronger visual indicator ── */
    .fav-slot.active {
      background: linear-gradient(145deg, rgba(212,132,154,0.18), rgba(13,27,42,0.99));
      box-shadow: 0 0 0 2px var(--pink), 0 4px 16px rgba(212,132,154,0.2);
    }
    .fav-slot.active .fav-title {
      color: var(--pink-pale);
    }
    /* Playing dot on active favorite */
    .fav-slot.active::after {
      content: '';
      position: absolute;
      bottom: 8px; left: 8px;
      width: 6px; height: 6px;
      background: var(--pink);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--pink);
      animation: breathe 2.5s ease-in-out infinite;
    }

    /* ── URL keyboard on link input ── */
    /* (inputmode set via HTML below) */

    /* ── Swipe affordance on favorites ── */
    .fav-slot {
      position: relative;
      overflow: hidden;
    }

    /* ── Touch action on progress ── */
    .progress-track {
      touch-action: none;
    }
  }

  /* Preview: compress on mobile so sign-in stays visible */
  @media (max-width: 480px) {
    .preview-wrap {
      margin-top: 10px;
      max-height: 260px;
      overflow: hidden;
      /* Fade out bottom to hint there's more */
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }
    .preview-ui {
      transform: scale(0.92);
      transform-origin: top center;
    }
  }

  /* ════════════════════════════════════════
     VARIANT D — COMPACT PLAYER + FAVS
     ════════════════════════════════════════ */

  /* ── Compact favorites grid ── */
  .favorites-grid-compact {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }

  .fav-compact {
    flex: 1;
    position: relative;
    height: 52px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s, transform 0.15s;
    background: var(--navy2);
  }

  .fav-compact:hover { border-color: var(--pink); }
  .fav-compact:active { transform: scale(0.96); }

  .fav-compact.empty {
    border-style: dashed;
    border-color: rgba(212,132,154,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: default;
    flex-direction: column;
  }
  .fav-compact.empty:hover { border-color: rgba(212,132,154,0.35); }

  .fav-compact.active {
    border-color: var(--pink);
    box-shadow: 0 0 0 1px var(--pink);
  }

  .fav-compact-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 8px;
  }

  .fav-compact-num {
    position: absolute;
    top: 3px; right: 4px;
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(245,237,232,0.8);
    background: rgba(13,27,42,0.55);
    border-radius: 3px;
    padding: 0 3px;
    line-height: 1.5;
    z-index: 2;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .fav-compact-dot {
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 5px; height: 5px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 5px var(--pink);
    animation: breathe 2.5s ease-in-out infinite;
    z-index: 2;
  }

  .fav-compact-remove {
    position: absolute;
    top: 2px; left: 3px;
    width: 18px; height: 18px;
    background: rgba(13,27,42,0.7);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    z-index: 3;
    padding: 0;
    line-height: 0;
  }

  .fav-compact:hover .fav-compact-remove { display: flex; }
  .fav-compact-remove:hover { color: var(--pink-soft); background: rgba(13,27,42,0.9); }

  /* ── Player D layout ── */
  .pd-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  /* Cover art — compact 36px on desktop, sized further on mobile */
  #ep-cover-wrap {
    width: 36px; height: 36px;
    border-radius: 7px;
    flex-shrink: 0;
  }

  #ep-cover-placeholder {
    border-radius: 7px;
  }

  .pd-meta {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .pd-ep-name {
    font-size: 0.88rem;
    font-weight: 400;
    font-style: italic;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .pd-ep-show {
    font-size: 0.72rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
  }

  .pd-hearts {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }

  /* Progress */
  .pd-progress {
    position: relative;
    z-index: 1;
    margin-bottom: 6px;
  }

  .pd-times {
    display: flex;
    justify-content: space-between;
    font-size: 0.66rem;
    color: var(--text-dim);
    margin-top: 4px;
    direction: ltr;
  }

  /* Inline loop bar */
  .pd-loop-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(13,27,42,0.5);
    border: 1px solid var(--border2);
    border-radius: 10px;
    flex-wrap: nowrap;
    position: relative;
    z-index: 1;
    margin-top: 2px;
  }

  .pd-loop-sep {
    width: 1px;
    height: 14px;
    background: var(--border);
    flex-shrink: 0;
  }

  .pd-count-inline {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .pd-count-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 1rem;
    line-height: 1;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
    transition: color 0.15s, background 0.15s;
    touch-action: manipulation;
    padding: 0;
  }

  .pd-count-btn:hover { color: var(--pink-soft); background: rgba(212,132,154,0.1); }

  /* Override count-input to be tiny inline */
  .pd-count-inline .count-input {
    width: 36px;
    font-size: 0.82rem;
    padding: 3px 4px;
    border-radius: 5px;
  }

  .pd-times-label {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* Loop status — compact */
  #loop-status {
    font-size: 0.72rem;
    color: var(--pink-soft);
    font-style: italic;
    flex: 1;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: auto;
    margin-top: 0;
  }

  /* ── MOBILE: floating D player ── */
  @media (max-width: 480px) {
    #player-card {
      padding: 8px 14px calc(14px + env(safe-area-inset-bottom, 0px));
    }

    #player-card.no-episode {
      padding-top: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    /* Cover stays small on mobile */
    #ep-cover-wrap { width: 34px; height: 34px; }

    /* Title slightly smaller */
    .pd-ep-name { font-size: 0.84rem; }

    /* Controls tighter */
    .controls { gap: 8px; margin-bottom: 6px; }
    .ctrl-btn.main { width: 46px; height: 46px; }

    /* Volume row compact */
    .volume-row { padding: 8px 0 0; margin-bottom: 6px; }

    /* Loop bar tighter */
    .pd-loop-bar { padding: 5px 8px; gap: 6px; }
    .pd-count-inline .count-input { width: 30px; font-size: 0.8rem; }

    /* Favorites compact grid on mobile */
    .favorites-grid-compact { gap: 8px; }
    .fav-compact { height: 46px; border-radius: 8px; }
    .fav-compact-remove { display: none !important; }

    /* Section padding tightened */
    #section-app {
      padding-bottom: calc(200px + env(safe-area-inset-bottom, 0px));
    }
  }

  /* Override old player empty state for Variant D */
  #player-card.no-episode .pd-top { opacity: 0.45; pointer-events: none; }
  #player-card.no-episode .pd-progress { opacity: 0.3; pointer-events: none; }
  #player-card.no-episode .controls { opacity: 0.3; pointer-events: none; }
  #player-card.no-episode .volume-row { opacity: 0.3; pointer-events: none; }
  #player-card.no-episode .pd-loop-bar { opacity: 0.3; pointer-events: none; }
  #player-card.no-episode .breathe-dot { opacity: 0; }
  #player-card.no-episode .now-playing-label { color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">

  <header>
    <span class="moon-icon">&#x1F319;</span>
    <h1><em>עוד</em> פעם</h1>
    <p>הסיפור שאינו נגמר</p>
  </header>

  <!-- SETUP -->
  <div id="section-setup">

    <div class="card">
      <div class="card-label">Connect to Spotify</div>
      <div class="field" style="margin-bottom:14px">
        <label style="display:block;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;font-weight:600">Spotify Client ID</label>
        <input type="text" id="client-id-input" placeholder="Paste your Client ID here..." style="width:100%;background:rgba(13,27,42,0.8);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:0.88rem;padding:11px 16px;outline:none;direction:ltr;text-align:left" />
      </div>
      <button class="btn btn-primary" onclick="startAuth()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Sign in with Spotify
      </button>
    </div>
    <div id="status"></div>

    <!-- PREVIEW — shown below the sign-in button -->
    <div class="preview-wrap">
      <div class="preview-ui">

        <!-- fake favorites -->
        <div style="margin-bottom:14px">
          <div style="font-size:0.62rem;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px">
            &#x2665; מועדפים
            <span style="flex:1;height:1px;background:linear-gradient(to left,rgba(201,169,110,0.25),transparent)"></span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px solid var(--border);border-radius:14px;padding:12px;min-height:88px;display:flex;flex-direction:column;gap:6px">
              <div style="width:100%;aspect-ratio:1;border-radius:8px;background:linear-gradient(135deg,rgba(212,132,154,0.2),rgba(92,61,46,0.3))"></div>
              <div style="height:8px;border-radius:4px;background:rgba(245,237,232,0.12);width:90%"></div>
              <div style="height:6px;border-radius:3px;background:rgba(245,237,232,0.07);width:65%"></div>
            </div>
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px dashed rgba(212,132,154,0.2);border-radius:14px;padding:12px;min-height:88px;display:flex;align-items:center;justify-content:center">
              <span style="font-size:1.1rem;opacity:0.2;color:var(--pink)">&#x2665;</span>
            </div>
            <div style="background:linear-gradient(145deg,rgba(18,34,54,0.97),rgba(13,27,42,0.99));border:1px dashed rgba(212,132,154,0.2);border-radius:14px;padding:12px;min-height:88px;display:flex;align-items:center;justify-content:center">
              <span style="font-size:1.1rem;opacity:0.2;color:var(--pink)">&#x2665;</span>
            </div>
          </div>
        </div>

        <!-- fake player card -->
        <div style="background:linear-gradient(160deg,rgba(22,38,60,0.98),rgba(13,27,42,1));border:1px solid var(--border);border-radius:24px;padding:24px 22px 20px">

          <div style="font-size:0.6rem;letter-spacing:0.22em;color:var(--pink-soft);text-transform:uppercase;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px">
            <div style="width:6px;height:6px;background:var(--pink);border-radius:50%;box-shadow:0 0 6px var(--pink)"></div>
            מתנגן עכשיו
          </div>

          <div style="display:flex;gap:14px;margin-bottom:18px;align-items:center">
            <div style="width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,rgba(92,61,46,0.5),rgba(212,132,154,0.2));flex-shrink:0"></div>
            <div style="flex:1">
              <div style="height:10px;border-radius:5px;background:rgba(245,237,232,0.15);width:88%;margin-bottom:8px"></div>
              <div style="height:10px;border-radius:5px;background:rgba(245,237,232,0.15);width:65%;margin-bottom:8px"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.07);width:50%"></div>
            </div>
          </div>

          <div style="margin-bottom:18px">
            <div style="height:3px;background:rgba(245,237,232,0.08);border-radius:2px;margin-bottom:8px;overflow:hidden">
              <div style="height:100%;width:38%;background:linear-gradient(to right,var(--pink),var(--gold));border-radius:2px"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-dim)">
              <span>14:22</span><span>38:47</span>
            </div>
          </div>

          <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px">
            <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#a85068)"></div>
            <div style="width:22px;height:22px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
            <div style="width:20px;height:20px;border-radius:50%;background:rgba(245,237,232,0.06)"></div>
          </div>

          <div style="background:rgba(13,27,42,0.5);border:1px solid var(--border2);border-radius:14px;padding:14px 16px">
            <div style="height:7px;border-radius:4px;background:rgba(201,169,110,0.2);width:40%;margin-bottom:12px"></div>
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:34px;height:18px;border-radius:9px;background:linear-gradient(135deg,var(--pink),#a85068)"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.08);width:50px"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.06);width:30px"></div>
              <div style="width:40px;height:26px;border-radius:7px;background:rgba(245,237,232,0.06)"></div>
              <div style="height:7px;border-radius:4px;background:rgba(245,237,232,0.06);width:30px"></div>
            </div>
          </div>

        </div>

      </div><!-- /preview-ui -->

      <div class="preview-overlay">
        <span class="preview-lock">&#x1F512;</span>
        <span class="preview-hint">התחברו כדי להתחיל</span>
      </div>
    </div><!-- /preview-wrap -->
  </div>

  <!-- APP -->
  <div id="section-app">

    <div id="user-bar">
      <div class="user-info">
        <img id="user-avatar" src="" alt="avatar" />
        <div>
          <span id="user-name">&#x2014;</span>
          <span id="user-plan">Premium</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="logout()">התנתקות</button>
    </div>

    <div class="search-row">
      <input class="search-input" type="text" id="search-input"
        placeholder="חפשו פרק או סיפור"
        onkeydown="if(event.key==='Enter')searchEpisodes()" />
      <button class="btn-search" onclick="searchEpisodes()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>

    </div>

    <div class="link-row">
      <input class="link-input" type="text" id="link-input"
        placeholder="https://open.spotify.com/episode/..."
        inputmode="url"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter')openSpotifyLink()" />
      <button class="btn-link" onclick="openSpotifyLink()">פתחו קישור</button>
    </div>

<!-- browse panel removed in Variant D -->

    <div class="favorites-section" id="favorites-section">
      <div class="favorites-label">&#x2665; מועדפים</div>
      <div class="favorites-grid-compact" id="favorites-grid">
        <!-- rendered by JS -->
      </div>
    </div>

    <div id="results">
      <h3>פרקים</h3>
      <div id="results-list"></div>
    </div>

    <div id="player-card" class="no-episode">

      <!-- Mini bar: shown only when no episode selected on mobile -->
      <div id="player-mini">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(212,132,154,0.5)" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span style="font-size:0.82rem;color:var(--text-dim);font-style:italic">בחרו פרק להשמעה...</span>
      </div>

      <!-- ── ROW 1: art + title/show + heart saves ── -->
      <div class="pd-top">

// ── SCROLL-HIDE HEADER ON MOBILE ──
(function() {
  let lastScrollY = 0;
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const header = document.querySelector('header');
        if (!header) { ticking = false; return; }
        const isMobile = window.innerWidth <= 480;
        if (isMobile) {
          if (window.scrollY > lastScrollY && window.scrollY > 60) {
            header.classList.add('hidden-header');
          } else {
            header.classList.remove('hidden-header');
          }
        } else {
          header.classList.remove('hidden-header');
        }
        lastScrollY = window.scrollY;
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();

// ── TAP OUTSIDE TO DISMISS RESULTS / BROWSE ──
document.addEventListener('click', (e) => {
  const results = document.getElementById('results');
  const browse = document.getElementById('browse-panel');
  if (results?.classList.contains('visible') &&
      !results.contains(e.target) &&
      !document.getElementById('search-input')?.contains(e.target) &&
      !e.target.closest('.btn-search')) {
    results.classList.remove('visible');
  }
  if (browse?.classList.contains('visible') &&
      !browse.contains(e.target) &&
      !e.target.closest('[onclick*="toggleBrowse"]')) {
    browse.classList.remove('visible');
    browseVisible = false;
  }
}, { passive: true });
</script>
<script>

// ── FAVORITES ──
const DEFAULT_FAVORITES = [
  null,
  null,
  null
];
const MAX_FAVORITES = 3;

function loadFavorites() {
  try {
    const stored = localStorage.getItem('sl_favorites');
    if (stored) {
      const parsed = JSON.parse(stored);
      return parsed.slice(0, MAX_FAVORITES); // enforce max 3
    }
  } catch(e) {}
  return [...DEFAULT_FAVORITES];
}

function saveFavoritesToStorage(favs) {
  localStorage.setItem('sl_favorites', JSON.stringify(favs));
}

function saveFavorite(slot) {
  if (!currentEpisodeUri) return;
  const favs = loadFavorites();
  favs[slot] = {
    uri:      currentEpisodeUri,
    name:     document.getElementById('ep-name').textContent,
    show:     document.getElementById('ep-show').textContent,
    image:    document.getElementById('ep-cover').src,
    startMs:  0
  };
  saveFavoritesToStorage(favs);
  renderFavorites();
  updateSaveHearts();
  setAppStatus('נשמר במועדפים ' + (slot + 1), 'success');
}

function clearFavorite(slot, e) {
  e.stopPropagation();
  const favs = loadFavorites();
  favs[slot] = null;
  saveFavoritesToStorage(favs);
  renderFavorites();
}

async function playFavorite(slot) {
  const favs = loadFavorites();
  const fav  = favs[slot];
  if (!fav || !deviceId) return;
  currentEpisodeUri        = fav.uri;
  currentEpisodeDurationMs = 0;
  repeatCount              = 0;
  updateLoopStatus();
  document.getElementById('ep-name').textContent = fav.name  || '...טוען';
  document.getElementById('ep-show').textContent = fav.show  || '';
  const _c=document.getElementById('ep-cover'),_p=document.getElementById('ep-cover-placeholder');
  if(fav.image){_c.src=fav.image;_c.style.display='block';_p.style.display='none';}else{_c.src='';_c.style.display='none';_p.style.display='flex';}
  document.getElementById('player-card').classList.remove('no-episode');
  document.getElementById('results').classList.remove('visible');
  await playEpisode(fav.startMs || 0);
  renderFavorites();
  updateSaveHearts();
}

async function fetchAndCacheFavoriteMeta(slot, uri) {
  // Extract episode ID from URI
  const epId = uri.replace('spotify:episode:', '');
  try {
    const res  = await spotifyFetch(`https://api.spotify.com/v1/episodes/${epId}?market=from_token`);
    if (!res.ok) return;
    const data = await res.json();
    const favs = loadFavorites();
    if (favs[slot] && favs[slot].uri === uri) {
      favs[slot].name  = data.name;
      favs[slot].show  = data.show?.name || '';
      favs[slot].image = data.images?.[0]?.url || '';
      saveFavoritesToStorage(favs);
      renderFavorites();
    }
  } catch(e) {}
}

function renderFavorites() {
  const favs = loadFavorites();
  const grid = document.getElementById('favorites-grid');
  grid.innerHTML = favs.map((fav, i) => {
    const isActive = fav && fav.uri === currentEpisodeUri;
    if (!fav) return `
      <div class="fav-compact empty" title="מקום פנוי ${i+1}">
        <span class="fav-compact-num">${i + 1}</span>

    return `
      <div class="fav-compact${isActive ? ' active' : ''}" onclick="playFavorite(${i})" title="${esc(fav.name || '')}">
        <span class="fav-compact-num">${i + 1}</span>
        ${fav.image
          ? `<img class="fav-compact-img" src="${esc(fav.image)}" alt="" />`
          : `<div class="fav-compact-img" style="background:var(--navy3);display:flex;align-items:center;justify-content:center"><span style="font-size:0.9rem;opacity:0.3">&#x1F319;</span></div>`}
        ${isActive ? '<div class="fav-compact-dot"></div>' : ''}
        <button class="fav-compact-remove" title="להסיר" onclick="clearFavorite(${i}, event)">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  }).join('');
}

async function initFavorites() {
  // Fetch metadata for any favorites that don't have it yet (e.g. the pre-saved one)
  const favs = loadFavorites();
  for (let i = 0; i < favs.length; i++) {
    if (favs[i] && !favs[i].name) {
      fetchAndCacheFavoriteMeta(i, favs[i].uri);
    }
  }
  renderFavorites();
}

// ── OPEN SPOTIFY LINK ──
function openSpotifyLink() {
  const raw = document.getElementById('link-input').value.trim();
  if (!raw) return;
  // Support formats: open.spotify.com/episode/ID or spotify:episode:ID
  let episodeId = null;
  const urlMatch = raw.match(/spotify\.com\/episode\/([A-Za-z0-9]+)/);
  const uriMatch = raw.match(/spotify:episode:([A-Za-z0-9]+)/);
  if (urlMatch) episodeId = urlMatch[1];
  else if (uriMatch) episodeId = uriMatch[1];
  if (!episodeId) { setAppStatus('קישור לא תקין. נסו קישור לפרק מ-Spotify.', 'error'); return; }

  // Parse t= timestamp if present
  let startMs = 0;
  const tMatch = raw.match(/[?&]t=(\d+)/);
  if (tMatch) startMs = parseInt(tMatch[1]) * 1000;

  setAppStatus('<span class="spinner"></span> טוען פרק...', '');
  spotifyFetch(`https://api.spotify.com/v1/episodes/${episodeId}?market=from_token`)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error.message);
      document.getElementById('link-input').value = '';
      selectEpisodeObj({
        uri: data.uri,
        name: data.name,
        show: data.show?.name || '',
        image: data.images?.[0]?.url || '',
        durationMs: data.duration_ms,
        startMs
      });
    })
    .catch(e => setAppStatus('שגיאה בטעינת הפרק: ' + e.message, 'error'));
}

function renderBrowseItems(items, type) {
  const list = document.getElementById('browse-list');
  if (!items.length) { list.innerHTML = '<div style="padding:16px;font-size:0.8rem;color:var(--text-dim);text-align:center">ריק.</div>'; return; }
  list.innerHTML = items.map(item => {
    if (!item) return '';
    const img = item.images?.[0]?.url || '';
    const name = esc(item.name || '');
    const sub = type === 'playlist'
      ? `${item.tracks?.total || ''} פריטים`
      : esc(item.show?.name || '');
    const onclick = type === 'playlist'
      ? `loadPlaylistEpisodes('${item.id}', '${esc(item.name || '')}')`
      : `selectEpisodeFromBrowse(${JSON.stringify({
          uri: item.uri,
          name: item.name,
          show: item.show?.name || '',
          image: img,
          durationMs: item.duration_ms
        }).replace(/"/g,'&quot;')})`;
    return `
      <div class="browse-item" onclick="${onclick}">
        ${img ? `<img src="${img}" alt=""/>` : `<div style="width:42px;height:42px;border-radius:8px;background:var(--navy2);flex-shrink:0"></div>`}

      </div>`;
  }).join('');
}
